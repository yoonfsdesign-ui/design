<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수담한정식 - Sudam Korean Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #e8e0d0; }
body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
.sudam-wrap { background: #f5f0e8; min-height: 100vh; width: 100%; max-width: 430px; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
.sudam-nav { background: #f5f0e8; display: flex; justify-content: space-between; align-items: center; padding: 16px 22px 12px; border-bottom: 0.5px solid #ddd8cc; position: sticky; top: 0; z-index: 100; }
.logo-kr { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; color: #2a2218; letter-spacing: -1px; line-height: 1; }
.logo-kr span { color: #b07d2c; }
.logo-en { font-size: 9px; letter-spacing: 3.5px; color: #8a7a5a; margin-top: 3px; font-weight: 300; }
.menu-btn { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
.menu-btn span { display: block; width: 26px; height: 1.5px; background: #2a2218; border-radius: 2px; }
.hero-section { padding: 42px 24px 28px; text-align: center; }
.hero-sub { font-size: 12px; letter-spacing: 5px; color: #8a7a5a; margin-bottom: 12px; font-weight: 300; }
.hero-title { font-family: 'Noto Serif KR', serif; font-size: 42px; font-weight: 700; color: #1e1a13; letter-spacing: -2px; line-height: 1.15; }
.card-section { margin: 0 16px 16px; border-radius: 9px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.18); position: relative; }
.card-img-wrap { display: block; width: 100%; }
.card-img-wrap img { width: 100%; height: auto; display: block; object-fit: cover; }
.card-header { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 12px; background: transparent; }
.card-label { font-size: 18px; color: #f0e8d8; font-weight: 300; letter-spacing: 1px; }
.card-plus { width: 36px; height: 36px; border-radius: 50%; background: rgba(240,232,216,0.9); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #2a1f14; cursor: pointer; font-weight: 300; line-height: 1; }
.card-divider-top { position: absolute; top: 52px; left: 20px; right: 20px; height: 1px; background: rgba(255,255,255,0.35); }
.card-footer { position: absolute; bottom: 0; left: 0; right: 0; background: transparent; padding: 14px 20px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.35); }
.card-footer-title { font-family: 'Noto Serif KR', serif; font-size: 19px; color: #f0e8d8; font-weight: 500; margin-bottom: 6px; letter-spacing: 2px; }
.card-footer-sub { font-size: 14px; color: #e0d0aa; letter-spacing: 4px; font-weight: 300; }
.card-footer-sub span { margin: 0 8px; opacity: 0.7; }
.dots-row { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 14px 0 6px; }
.dot { height: 3px; border-radius: 2px; }
.dot.active { width: 44px; background: #b07d2c; }
.dot.inactive { width: 10px; background: #c8b48a; opacity: 0.45; }
.bottom-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 0.5px solid #ddd8cc; margin-top: 10px; }
.bb-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 4px; gap: 4px; border-right: 0.5px solid #ddd8cc; cursor: pointer; }
.bb-item:last-child { border-right: none; }
.bb-item:active { opacity: 0.7; }
.bb-icon-wrap { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.bb-icon-svg { width: 20px; height: 20px; }
.bb-title { font-size: 10px; font-weight: 500; color: #2a2218; text-align: center; letter-spacing: -0.3px; white-space: nowrap; }
.bb-sub { font-size: 9px; color: #8a7a5a; text-align: center; letter-spacing: -0.2px; white-space: nowrap; }
.bb-item.phone-highlight { background: #b07d2c; }
.bb-item.phone-highlight .bb-title, .bb-item.phone-highlight .bb-sub { color: #fff; }
.bb-item.kakao { background: #fee500; }
.bb-item.kakao .bb-title, .bb-item.kakao .bb-sub { color: #3c1e1e; }
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.drawer-overlay.open { display: block; }
.drawer { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #f5f0e8; z-index: 300; transition: right 0.3s ease; padding: 24px 28px; display: flex; flex-direction: column; }
.drawer.open { right: 0; }
.drawer-close { align-self: flex-end; background: none; border: none; font-size: 24px; cursor: pointer; color: #2a2218; margin-bottom: 24px; }
.drawer-menu-item { padding: 16px 0; border-bottom: 0.5px solid #ddd8cc; font-family: 'Noto Serif KR', serif; font-size: 16px; color: #2a2218; cursor: pointer; letter-spacing: 1px; }
.drawer-menu-item:hover { color: #b07d2c; }
</style>
</head>

let startX = 0;
const card = document.querySelector('.card-section');
card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
card.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  const dots = document.querySelectorAll('.dot');
  let active = [...dots].findIndex(d => d.classList.contains('active'));
  if (Math.abs(dx) > 40) {
    dots[active].classList.remove('active'); dots[active].classList.add('inactive');
    active = dx < 0 ? Math.min(active+1, dots.length-1) : Math.max(active-1, 0);
    dots[active].classList.remove('inactive'); dots[active].classList.add('active');
  }
}, { passive: true });
</script>
</body>
</html>
